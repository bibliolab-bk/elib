<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat SANKALA Bibliotherapy...</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background-color: #f8fafc; font-family: 'Inter', sans-serif; 
        }
        .container { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; text-align: center; 
        }
        .logo {
            width: 64px; height: 64px; background: linear-gradient(135deg, #3b82f6, #1a56db); 
            border-radius: 16px; display: flex; align-items: center; justify-content: center; 
            color: white; font-size: 2em; font-weight: bold; margin-bottom: 24px;
            box-shadow: 0 10px 25px rgba(37,99,235,0.2);
            animation: pulse 2s infinite;
        }
        h1 { color: #0f172a; margin: 0 0 8px 0; font-size: 1.5em; }
        p { color: #64748b; margin: 0; }
        .spinner { 
            width: 40px; height: 40px; border: 4px solid #e2e8f0; 
            border-top: 4px solid #3b82f6; border-radius: 50%; 
            animation: spin 1s linear infinite; margin-top: 32px; 
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">S</div>
        <h1>SANKALA Bibliotherapy</h1>
        <p>Menghubungkan ke ruang literasi Anda...</p>
        <div class="spinner"></div>
        <p id="fallback-msg" style="display: none; margin-top: 20px; font-size: 0.9em;">
            Jika Anda tidak otomatis diarahkan, <a id="manual-link" href="#" style="color: #2563eb;">klik di sini</a>.
        </p>
    </div>

    <script>
        // MASUKKAN LINK /EXEC GOOGLE APPS SCRIPT ANDA DI SINI
        const URL_ASLI_GAS = "https://script.google.com/macros/s/AKfycby_3HgJHPC4_qXWOD-mMODyr8ottxdK_E7qXq1FIfIxQBfjrAjIqHLKSRPJTEQPCM0jvQ/exec";

        // Segera setelah halaman dimuat, lakukan redirect.
        window.location.replace(URL_ASLI_GAS);

        // Jika karena suatu alasan redirect gagal, tampilkan tombol manual setelah 3 detik
        setTimeout(() => {
            document.getElementById('fallback-msg').style.display = 'block';
            document.getElementById('manual-link').href = URL_ASLI_GAS;
        }, 3000);
    </script>
</body>
</html>
